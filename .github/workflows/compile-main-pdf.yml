name: Compile Engineering Challenges PDF

on:
  workflow_dispatch:
    inputs:
      keep_artifact_days:
        description: "Artifact retention in days"
        required: false
        default: "30"
  pull_request:
    paths:
      - "work_ec08/**"
      - ".github/workflows/compile-main-pdf.yml"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - "work_ec08/**"
      - ".github/workflows/compile-main-pdf.yml"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: compile-main-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile main.pdf
    if: github.event_name != 'push' || github.event.head_commit.message != 'chore: update compiled main.pdf'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: work_ec08
          root_file: main.tex
          latexmk_use_xelatex: false
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Verify generated PDF
        run: test -s work_ec08/main.pdf

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: Engineering-Challenges-PDF
          path: work_ec08/main.pdf
          if-no-files-found: error
          retention-days: ${{ github.event.inputs.keep_artifact_days || 30 }}

      - name: Commit updated PDF to main
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add work_ec08/main.pdf

          if git diff --cached --quiet; then
            echo "main.pdf is already up to date."
            exit 0
          fi

          git commit -m "chore: update compiled main.pdf"
          git push origin HEAD:main
